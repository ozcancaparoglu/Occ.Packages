name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Pack & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Occ.Packages.sln

      - name: Build
        run: |
          dotnet build Occ.Packages.sln \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack
        run: |
          dotnet pack Occ.Packages.sln \
            --configuration Release \
            --no-build \
            --no-restore \
            --output ./artifacts \
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate